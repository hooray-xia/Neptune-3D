<body onselectstart="return false">
	<canvas id="bg"></canvas>
	<script type="module">
		const cnv = document.getElementById('bg');
		const s = new THREE.Scene();
		s.background = new THREE.Color('rgb(0,0,0)');

		const c = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
		c.position.z = 12;

		const r = new THREE.WebGLRenderer({
			canvas: cnv,
			antialias: true,
			preserveDrawingBuffer: true
		});
		r.setSize(window.innerWidth, window.innerHeight);
		r.setPixelRatio(Math.min(window.devicePixelRatio, 2));

		const l = new THREE.TextureLoader();
		l.setCrossOrigin('anonymous');
		const nt = l.load('https://upload.wikimedia.org/wikipedia/commons/1/1e/Solarsystemscope_texture_2k_neptune.jpg');
		const mt = l.load('https://upload.wikimedia.org/wikipedia/commons/9/9d/Neptune%E2%80%99s_Moon_Triton_Fosters_Rare_Icy_Union_%28gemini1903a%29_square.jpg');

		const sg = new THREE.BufferGeometry();
		const sc = 15000;
		const pa = new Float32Array(sc * 3);
		for (let i = 0; i < sc * 3; i++) pa[i] = (Math.random() - 0.5) * 200;
		sg.setAttribute('position', new THREE.BufferAttribute(pa, 3));
		const st = new THREE.Points(sg, new THREE.PointsMaterial({
			size: 0.05,
			color: new THREE.Color('rgb(255,255,255)')
		}));
		s.add(st);

		const g = new THREE.SphereGeometry(5, 64, 64);
		const uv = g.attributes.uv;
		for (let i = 0; i < uv.count; i++) {
			let u = uv.getX(i);
			if (u > 0.5) u = 1 - u;
			uv.setX(i, u * 2);
		}
		const p = new THREE.Mesh(g, new THREE.MeshStandardMaterial({
			map: nt,
			roughness: 0.8,
			metalness: 0.1
		}));
		s.add(p);

		const m = new THREE.Mesh(new THREE.SphereGeometry(0.8, 32, 32), new THREE.MeshStandardMaterial({
			map: mt,
			roughness: 0.9
		}));
		s.add(m);

		s.add(new THREE.AmbientLight(new THREE.Color('rgb(255,255,255)'), 0.4));
		const ml = new THREE.DirectionalLight(new THREE.Color('rgb(255,255,255)'), 1.0);
		ml.position.set(5, 3, 5);
		s.add(ml);
		const bl = new THREE.DirectionalLight(new THREE.Color('rgb(68,119,255)'), 0.5);
		bl.position.set(-5, -3, -5);
		s.add(bl);

		function anim() {
			requestAnimationFrame(anim);
			const t = Date.now() * 0.0005;

			p.rotation.y += 0.002;
			st.rotation.y += 0.0001;

			m.position.x = Math.cos(t) * 10;
			m.position.z = Math.sin(t) * 10;

			r.render(s, c);
		}

		window.addEventListener('resize', () => {
			c.aspect = window.innerWidth / window.innerHeight;
			c.updateProjectionMatrix();
			r.setSize(window.innerWidth, window.innerHeight);
		});

		window.addEventListener('message', e => {
			if (e.data === 'capture') {
				window.top.postMessage(cnv.toDataURL(), '*');
			}
		});

		anim();
	</script>
	<script>
	</script>
